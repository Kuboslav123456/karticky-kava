<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generátor kartičiek ku káve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- pdfmake (vector PDF export with built-in Roboto font; supports Slovak + Czech diacritics) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <h1 class="topbar__title" data-i18n="appTitle">Generátor kartičiek ku káve</h1>
      <p class="topbar__sub"  data-i18n="appSubtitle">A4 hárok 4×4 — pripravený na strihanie a tlač</p>
    </div>

    <div class="topbar__right">
      <div class="lang-switch" role="group" aria-label="Language">
        <span class="lang-switch__label" data-i18n="languageLabel">Jazyk</span>
        <button type="button" class="lang-btn" data-lang="sk" aria-pressed="true">SK</button>
        <button type="button" class="lang-btn" data-lang="cs" aria-pressed="false">CS</button>
      </div>

      <div class="topbar__divider"></div>

      <!-- Kartičky -->
      <div class="topbar__group">
        <span class="topbar__group-label">Kartičky</span>
        <div class="topbar__group-actions">
          <button type="button" id="reset-all" class="btn btn--ghost" data-i18n="resetAll">Vymazať všetko</button>
          <button type="button" id="print-btn" class="btn btn--secondary">
            <span data-i18n="printBtn">Tlačiť</span>
          </button>
          <button type="button" id="export-pdf" class="btn btn--primary">
            <span data-i18n="exportPdf">Exportovať PDF</span>
          </button>
        </div>
      </div>

      <div class="topbar__divider"></div>

      <!-- Plagáty -->
      <div class="topbar__group">
        <span class="topbar__group-label">Plagát</span>
        <div class="topbar__group-actions">
          <div class="poster-size" role="group" aria-label="Poster size">
            <button type="button" class="poster-size__btn" data-poster-size="A4">A4</button>
            <button type="button" class="poster-size__btn" data-poster-size="A5">A5</button>
            <button type="button" class="poster-size__btn" data-poster-size="A6">A6</button>
          </div>
          <button type="button" id="export-poster" class="btn btn--primary">
            <span data-i18n="exportPoster">Exportovať plagát</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="app-grid">
    <!-- ── LEFT: form pane ─────────────────────────────── -->
    <section class="form-pane" aria-label="Form">
      <div class="form-search" id="form-search">
        <svg class="form-search__icon" viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M11 4a7 7 0 1 1 0 14 7 7 0 0 1 0-14z"/>
          <path d="M21 21l-5-5"/>
        </svg>
        <input id="form-search-input" type="search" class="form-search__input"
               data-i18n-ph="searchPh" placeholder="Hľadať pražiareň, kávu…"
               autocomplete="off" spellcheck="false" />
        <button type="button" id="form-search-clear" class="form-search__clear"
                aria-label="Clear search" title="Clear">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12"/><path d="M6 18L18 6"/>
          </svg>
        </button>
      </div>

      <div id="coffee-forms" class="coffee-forms"></div>

      <div class="form-pane__actions">
        <button type="button" id="add-coffee" class="btn btn--secondary btn--block">
          <span data-i18n="addCoffee">+ Pridať ďalšiu kávu</span>
        </button>

        <p class="autosave-hint" data-i18n="autoSaved">Automaticky uložené</p>
      </div>

      <!-- ── Import / Export databázy ───────────────────── -->
      <div class="db-panel">
        <div class="db-panel__head" id="db-panel-toggle" role="button" tabindex="0"
             aria-expanded="false" aria-controls="db-panel-body">
          <svg class="db-panel__chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 9l6 6 6-6"/>
          </svg>
          <span data-i18n="dbPanel">Databáza</span>
        </div>
        <div class="db-panel__body" id="db-panel-body" hidden>
          <p class="db-panel__desc" data-i18n="dbPanelDesc">
            Záloha všetkých kartičiek vo formáte JSON.
          </p>
          <div class="db-panel__actions">
            <button type="button" id="export-db" class="btn btn--secondary">
              <span data-i18n="exportDb">↓ Exportovať</span>
            </button>
            <button type="button" id="import-db" class="btn btn--ghost">
              <span data-i18n="importDb">↑ Importovať</span>
            </button>
          </div>
          <input type="file" id="import-db-file" accept=".json" hidden>

          <h4 class="db-panel__sub-title" data-i18n="versionsTitle">Automatické verzie</h4>
          <ul id="db-versions" class="db-panel__versions" aria-live="polite"></ul>
        </div>
      </div>
    </section>

    <!-- ── RIGHT: A4 preview pane ──────────────────────── -->
    <section class="preview-pane" aria-label="Preview">
      <!-- Strana A (predná) — políčka -->
      <div class="a4-wrap">
        <span class="a4-wrap__label" data-i18n="frontLabel">Strana A — políčka</span>
        <div class="a4-sheet" id="a4-sheet-fields" aria-label="Sheet A">
          <!-- 16 fields cards injected by app.js -->
        </div>
        <div class="a4-cropmarks" aria-hidden="true">
          <svg viewBox="0 0 210 297" preserveAspectRatio="none"></svg>
        </div>
      </div>

      <!-- Strana B (zadná) — popis -->
      <div class="a4-wrap a4-wrap--back">
        <span class="a4-wrap__label" data-i18n="backLabel">Strana B — popis</span>
        <div class="a4-sheet" id="a4-sheet-desc" aria-label="Sheet B">
          <!-- 16 description cards injected by app.js -->
        </div>
        <div class="a4-cropmarks" aria-hidden="true">
          <svg viewBox="0 0 210 297" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
