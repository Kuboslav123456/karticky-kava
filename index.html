<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Generátor kartičiek ku káve</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />

  <!-- pdfmake (vector PDF export with built-in Roboto font; supports Slovak + Czech diacritics) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/pdfmake.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.10/vfs_fonts.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="topbar__left">
      <h1 class="topbar__title" data-i18n="appTitle">Generátor kartičiek ku káve</h1>
      <p class="topbar__sub"  data-i18n="appSubtitle">A4 hárok 4×4 — pripravený na strihanie a tlač</p>
    </div>

    <div class="topbar__right">
      <div class="lang-switch" role="group" aria-label="Language">
        <span class="lang-switch__label" data-i18n="languageLabel">Jazyk</span>
        <button type="button" class="lang-btn" data-lang="sk" aria-pressed="true">SK</button>
        <button type="button" class="lang-btn" data-lang="cs" aria-pressed="false">CS</button>
      </div>

      <button type="button" id="reset-all" class="btn btn--ghost" data-i18n="resetAll">Vymazať všetko</button>
      <button type="button" id="print-btn" class="btn btn--secondary">
        <span data-i18n="printBtn">Tlačiť</span>
      </button>
      <button type="button" id="export-pdf" class="btn btn--primary">
        <span data-i18n="exportPdf">Exportovať PDF</span>
      </button>
    </div>
  </header>

  <main class="app-grid">
    <!-- ── LEFT: form pane ─────────────────────────────── -->
    <section class="form-pane" aria-label="Form">
      <div id="coffee-forms" class="coffee-forms"></div>

      <div class="form-pane__actions">
        <button type="button" id="add-coffee" class="btn btn--secondary btn--block">
          <span data-i18n="addCoffee">+ Pridať ďalšiu kávu</span>
        </button>

        <div class="copies-meter" aria-live="polite">
          <span class="copies-meter__label" data-i18n="cardsTotal">Spolu kartičiek</span>
          <span class="copies-meter__value" id="copies-summary">16 / 16</span>
        </div>

        <p class="autosave-hint" data-i18n="autoSaved">Automaticky uložené</p>

        <details class="back-offset">
          <summary data-i18n="backOffsetTitle">Kalibrácia obojstrannej tlače</summary>
          <p class="back-offset__help" data-i18n="backOffsetHelp">
            Ak po obojstrannej tlači orezové čiary nelícujú, posuň zadnú stranu o niekoľko mm:
          </p>
          <div class="back-offset__inputs">
            <label class="back-offset__field">
              <span data-i18n="backOffsetX">Posun X (mm)</span>
              <input type="number" id="back-offset-x" step="0.1" min="-5" max="5" value="0">
            </label>
            <label class="back-offset__field">
              <span data-i18n="backOffsetY">Posun Y (mm)</span>
              <input type="number" id="back-offset-y" step="0.1" min="-5" max="5" value="0">
            </label>
          </div>
        </details>
      </div>
    </section>

    <!-- ── RIGHT: A4 preview pane ──────────────────────── -->
    <section class="preview-pane" aria-label="Preview">
      <!-- Coffee selector: choose which coffee appears in preview + export -->
      <nav class="preview-selector" id="preview-selector" aria-label="Coffee selector">
        <span class="preview-selector__label" data-i18n="previewLabel">Náhľad</span>
        <div class="preview-selector__chips" id="preview-chips"></div>
      </nav>

      <!-- Strana A (predná) — políčka -->
      <div class="a4-wrap">
        <span class="a4-wrap__label" data-i18n="frontLabel">Strana A — políčka</span>
        <div class="a4-sheet" id="a4-sheet-fields" aria-label="Sheet A">
          <!-- 16 fields cards injected by app.js -->
        </div>
        <div class="a4-cropmarks" aria-hidden="true">
          <svg viewBox="0 0 210 297" preserveAspectRatio="none"></svg>
        </div>
      </div>

      <!-- Strana B (zadná) — popis -->
      <div class="a4-wrap a4-wrap--back">
        <span class="a4-wrap__label" data-i18n="backLabel">Strana B — popis</span>
        <div class="a4-sheet" id="a4-sheet-desc" aria-label="Sheet B">
          <!-- 16 description cards injected by app.js -->
        </div>
        <div class="a4-cropmarks" aria-hidden="true">
          <svg viewBox="0 0 210 297" preserveAspectRatio="none"></svg>
        </div>
      </div>
    </section>
  </main>

  <script type="module" src="js/app.js"></script>
</body>
</html>
